    <style>
      html, body { background:#0b0d14; color:#e2e8f0; margin:0; padding:0; min-height:100%; overflow-x:hidden;
                   font-family:'DM Sans', system-ui, -apple-system, sans-serif; }
      #root { min-height:100vh; }
      .rai-boot {
        position:fixed; inset:0;
        display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px;
        background: radial-gradient(circle at 50% 30%, rgba(99,102,241,.10) 0%, transparent 60%), #0b0d14;
        z-index: 9999;
      }
      .rai-boot-mark {
        width:60px; height:60px; border-radius:16px;
        background:linear-gradient(135deg,#6366f1,#a855f7);
        box-shadow:0 12px 36px rgba(99,102,241,.4);
        display:grid; place-items:center; color:#fff;
        font-family:'Syne', sans-serif; font-weight:800; font-size:28px;
        animation: rai-boot-float 2.5s ease-in-out infinite;
      }
      .rai-boot-text { font-family:'Syne', sans-serif; font-weight:800; font-size:22px; }
      .rai-boot-sub  { font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#8b91a3;
                       display:flex; align-items:center; gap:8px; }
      .rai-boot-spin { width:14px; height:14px; border-radius:50%;
                       border:2px solid rgba(99,102,241,.2); border-top-color:#a855f7;
                       animation: rai-boot-spin .9s linear infinite; }
      @keyframes rai-boot-spin  { to { transform:rotate(360deg); } }
      @keyframes rai-boot-float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
    </style>
