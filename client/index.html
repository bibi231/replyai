<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d14" />
    <title>ReplyAI — AI Email Reply Generator | Write Better Emails Faster</title>
    <meta name="description" content="ReplyAI generates 3 professional email reply drafts in seconds. Choose your tone, paste any email, get instant AI-powered replies. Free to start. Built for Nigeria and the world." />
    <meta name="keywords" content="AI email reply, email reply generator, professional email, AI writing tool, email assistant, Nigeria AI tool" />
    <link rel="canonical" href="https://replyai.com.ng" />

    <!-- OpenGraph / social -->
    <meta property="og:title" content="ReplyAI — Write Better Emails in Seconds" />
    <meta property="og:description" content="Paste any email, pick a tone, get 3 polished reply drafts instantly. Free tier available." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://replyai.com.ng" />
    <meta property="og:image" content="https://replyai.com.ng/og-image.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReplyAI — AI Email Reply Generator" />
    <meta name="twitter:description" content="3 polished email drafts in seconds. Free tier. Built in Nigeria." />
    <meta name="twitter:image" content="https://replyai.com.ng/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://api.replyai.com.ng" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

    <!-- Payment gateways (deferred so they don't block first paint) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ReplyAI",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "url": "https://replyai.com.ng",
      "description": "AI-powered email reply generator. Get 3 professional drafts in seconds.",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD", "description": "Free tier available, paid credits from $1" },
      "author": { "@type": "Organization", "name": "TrueWeb Solutions", "url": "https://replyai.com.ng" }
    }
    </script>

    <script defer src="https://js.paystack.co/v1/inline.js"></script>
    <script defer src="https://checkout.flutterwave.com/v3.js"></script>

    <style>
      /* Inline boot shell so the page is never blank */
      html, body { background:#0b0d14; color:#e2e8f0; margin:0; padding:0; min-height:100%;
                   font-family:'DM Sans', system-ui, -apple-system, sans-serif; }
      #root { min-height:100vh; }
      .rai-boot {
        position:fixed; inset:0;
        display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px;
        background: radial-gradient(circle at 50% 30%, rgba(99,102,241,.10) 0%, transparent 60%), #0b0d14;
        z-index: 9999;
      }
      .rai-boot-mark {
        width:60px; height:60px; border-radius:16px;
        background:linear-gradient(135deg,#6366f1,#a855f7);
        box-shadow:0 12px 36px rgba(99,102,241,.4);
        display:grid; place-items:center; color:#fff;
        font-family:'Syne', sans-serif; font-weight:800; font-size:28px;
        animation: rai-boot-float 2.5s ease-in-out infinite;
      }
      .rai-boot-text { font-family:'Syne', sans-serif; font-weight:800; font-size:22px; }
      .rai-boot-sub  { font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#8b91a3;
                       display:flex; align-items:center; gap:8px; }
      .rai-boot-spin { width:14px; height:14px; border-radius:50%;
                       border:2px solid rgba(99,102,241,.2); border-top-color:#a855f7;
                       animation: rai-boot-spin .9s linear infinite; }
      @keyframes rai-boot-spin  { to { transform:rotate(360deg); } }
      @keyframes rai-boot-float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="rai-boot" class="rai-boot" aria-busy="true">
        <div class="rai-boot-mark">R</div>
        <div class="rai-boot-text">ReplyAI</div>
        <div class="rai-boot-sub"><span class="rai-boot-spin"></span> Loading inbox engine</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
