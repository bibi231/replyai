  <head>

    <!-- Font preloads -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="preconnect" href="https://api.replyai.com.ng" />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ReplyAI",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "url": "https://replyai.com.ng",
      "description": "AI-powered email reply generator. Get 3 professional reply drafts in seconds. Supports English, Nigerian Pidgin, Yoruba, Hausa and French.",
      "featureList": ["3 AI reply drafts per generation","5 tone options","5 language options including Nigerian Pidgin and Yoruba","Reply history dashboard","Template saving","Chrome extension"],
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "0",
        "highPrice": "8",
        "priceCurrency": "USD",
        "description": "Free tier: 5 replies/month. Paid packs from $1."
      },
      "author": { "@type": "Organization", "name": "TrueWeb Solutions", "url": "https://replyai.com.ng" },
      "screenshot": "https://replyai.com.ng/og-image.png",
      "inLanguage": ["en","pcm","yo","ha","fr"]
    }
    </script>

    <!-- JSON-LD: FAQ (helps grab featured snippets) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does ReplyAI work?",
          "acceptedAnswer": { "@type": "Answer", "text": "Paste the email you received into ReplyAI, pick a tone (Professional, Friendly, Firm, Apologetic, or Custom), and click Generate. ReplyAI uses AI to write 3 different reply drafts in about 3 seconds." }
        },
        {
          "@type": "Question",
          "name": "Is ReplyAI free?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. ReplyAI gives you 5 free reply generations per month. Paid credit packs start from NGN 1,500 (about $1 USD) for 30 credits." }
        },
        {
          "@type": "Question",
          "name": "What languages does ReplyAI support?",
          "acceptedAnswer": { "@type": "Answer", "text": "ReplyAI supports English, Nigerian Pidgin, Yoruba, Hausa, and French." }
        },
        {
          "@type": "Question",
          "name": "Can I use ReplyAI on my phone?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. ReplyAI works on any browser including mobile. There is also a Chrome extension for replying directly from Gmail and other web inboxes." }
        }
      ]
    }
    </script>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7798519284162823" crossorigin="anonymous"></script>

    <!-- Payment gateways (deferred so they don't block first paint) -->
    <script defer src="https://js.paystack.co/v1/inline.js"></script>
    <script defer src="https://checkout.flutterwave.com/v3.js"></script>

    <style>
      html, body { background:#0b0d14; color:#e2e8f0; margin:0; padding:0; min-height:100%; overflow-x:hidden;
                   font-family:'DM Sans', system-ui, -apple-system, sans-serif; }
      #root { min-height:100vh; }
      .rai-boot {
        position:fixed; inset:0;
        display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px;
        background: radial-gradient(circle at 50% 30%, rgba(99,102,241,.10) 0%, transparent 60%), #0b0d14;
        z-index: 9999;
      }
      .rai-boot-mark {
        width:60px; height:60px; border-radius:16px;
        background:linear-gradient(135deg,#6366f1,#a855f7);
        box-shadow:0 12px 36px rgba(99,102,241,.4);
        display:grid; place-items:center; color:#fff;
        font-family:'Syne', sans-serif; font-weight:800; font-size:28px;
        animation: rai-boot-float 2.5s ease-in-out infinite;
      }
      .rai-boot-text { font-family:'Syne', sans-serif; font-weight:800; font-size:22px; }
      .rai-boot-sub  { font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#8b91a3;
                       display:flex; align-items:center; gap:8px; }
      .rai-boot-spin { width:14px; height:14px; border-radius:50%;
                       border:2px solid rgba(99,102,241,.2); border-top-color:#a855f7;
                       animation: rai-boot-spin .9s linear infinite; }
      @keyframes rai-boot-spin  { to { transform:rotate(360deg); } }
      @keyframes rai-boot-float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="rai-boot" class="rai-boot" aria-busy="true">
        <div class="rai-boot-mark">R</div>
        <div class="rai-boot-text">ReplyAI</div>
        <div class="rai-boot-sub"><span class="rai-boot-spin"></span> Loading inbox engine</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
